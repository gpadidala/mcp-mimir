services:
  # Default MCP Prometheus server — set PROMETHEUS_ORGID in .env or shell
  mcp-prometheus:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-prometheus:latest
    container_name: mcp-prometheus
    ports:
      - "${MCP_PORT:-8080}:8080"
      - "${METRICS_PORT:-9091}:9091"
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://host.docker.internal:9090}
      - PROMETHEUS_ORGID=${PROMETHEUS_ORGID:-}
      - PROMETHEUS_USERNAME=${PROMETHEUS_USERNAME:-}
      - PROMETHEUS_PASSWORD=${PROMETHEUS_PASSWORD:-}
      - PROMETHEUS_TOKEN=${PROMETHEUS_TOKEN:-}
      - TRANSPORT=${TRANSPORT:-sse}
      - HTTP_ADDR=${HTTP_ADDR:-:8080}
      - METRICS_ADDR=${METRICS_ADDR:-:9091}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ---------------------------------------------------------------
  # MULTI-ORG SETUP: Uncomment below to run per-org MCP servers
  # Each org gets its own port and MCP server instance

###############################################################################
# MCP Mimir — PERF Environment Overlay
#
# Namespace:  sample-perf
# Key Vault:  sample-perf-eu-kv-01
# Hostname:   sample-metrics-perf-01.albertsons.com
# Replicas:   2
###############################################################################
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sample-perf

labels:
  - pairs:
      environment: perf
    includeSelectors: false

resources:
  - ../../base

patches:
  - path: deployment-patch.yaml
  - path: virtualservice-patch.yaml
  - path: azure-keyvault-patch.yaml
  - path: configmap-patch.yaml

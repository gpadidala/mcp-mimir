apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-mcp-mimir
  labels:
    environment: perf
spec:
  replicas: 2
  template:
    metadata:
      labels:
        environment: perf
    spec:
      containers:
        - name: mcp-mimir
          image: "escoacrprod01.azurecr.io/sample/sample-mimir-mcp:v1.0.0-snapshot"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      # ── Zone-aware scheduling for HA ──
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: sample-mcp-mimir

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-prometheus
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: mcp-prometheus
          image: mcp-prometheus:latest
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-prometheus

###############################################################################
# MCP Mimir — DEV Environment Overlay
#
# Namespace:  sample-dev
# Key Vault:  sample-dev-eu-kv-01
# Hostname:   sample-metrics-perf-01.albertsons.com
# Replicas:   1
###############################################################################
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sample-dev

labels:
  - pairs:
      environment: dev
    includeSelectors: false

resources:
  - ../../base

patches:
  # ── Deployment: dev replicas, resources, env ──
  - path: deployment-patch.yaml
  # ── VirtualService: dev hostname ──
  - path: virtualservice-patch.yaml
  # ── Azure Key Vault: dev vault name ──
  - path: azure-keyvault-patch.yaml
  # ── ConfigMap: dev-specific config ──
  - path: configmap-patch.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-mcp-mimir
  labels:
    environment: prod
spec:
  replicas: 3
  template:
    metadata:
      labels:
        environment: prod
    spec:
      containers:
        - name: mcp-mimir
          image: "escoacrprod01.azurecr.io/sample/sample-mimir-mcp:v1.0.0"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: "1Gi"
      # ── Zone-aware scheduling for HA ──
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: sample-mcp-mimir
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: sample-mcp-mimir

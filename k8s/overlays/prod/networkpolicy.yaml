###############################################################################
# NetworkPolicy — Prod only
#
# Restricts ingress/egress to only required traffic:
#   Ingress: Istio ingress gateway (port 8000), Prometheus scraping (port 9090)
#   Egress:  DNS, Mimir/Prometheus backend
###############################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sample-mcp-mimir
  labels:
    app.kubernetes.io/name: sample-mcp-mimir
    app: sample-mcp-mimir
    appcode: SAMPLE
    costcenter: "9901623"
    drcategory: "dr3"
    portfolio: AI-CloudOps
    project: SAMPLE
spec:
  podSelector:
    matchLabels:
      app: sample-mcp-mimir
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from Istio ingress gateway
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 8000
          protocol: TCP
    # Allow Prometheus scraping metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9090
          protocol: TCP
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS to Mimir/Prometheus backends
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 9090
          protocol: TCP

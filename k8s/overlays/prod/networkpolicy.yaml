apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-prometheus
  namespace: mcp-prometheus-prod
  labels:
    app.kubernetes.io/name: mcp-prometheus
    app.kubernetes.io/component: mcp-server
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mcp-prometheus
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
          protocol: TCP
    # Allow Prometheus scraping metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9091
          protocol: TCP
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow traffic to Mimir/Prometheus
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mimir-prod
      ports:
        - port: 8080
          protocol: TCP
        - port: 9090
          protocol: TCP

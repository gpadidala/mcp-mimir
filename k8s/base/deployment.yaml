apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-prometheus
  labels:
    app.kubernetes.io/name: mcp-prometheus
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-prometheus
        app.kubernetes.io/component: mcp-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: mcp-prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: mcp-prometheus
          image: mcp-prometheus:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              exec mcp-prometheus serve \
                --transport "${TRANSPORT}" \
                --http-addr "${HTTP_ADDR}" \
                --metrics-addr "${METRICS_ADDR}"
          ports:
            - name: http-mcp
              containerPort: 8080
              protocol: TCP
            - name: http-metrics
              containerPort: 9091
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mcp-prometheus-config
            - secretRef:
                name: mcp-prometheus-secret
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http-metrics
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http-metrics
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http-metrics
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 10
      terminationGracePeriodSeconds: 30

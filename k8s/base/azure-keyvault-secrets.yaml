###############################################################################
# Azure Key Vault Secrets (akv2k8s operator — spv.no)
#
# Syncs secrets from Azure Key Vault into Kubernetes secrets.
# The Key Vault name is overridden per-environment via Kustomize patches.
###############################################################################

# ── Mimir Service Account Token (for MCP → Mimir API auth) ──
apiVersion: spv.no/v1
kind: AzureKeyVaultSecret
metadata:
  name: mcp-mimir-service-account-token
  labels:
    app.kubernetes.io/name: sample-mcp-mimir
    app: sample-mcp-mimir
    appcode: SAMPLE
spec:
  vault:
    name: sample-dev-eu-kv-01
    object:
      name: mcp-mimir-service-account-token
      type: secret

---
# ── TLS CA Certificate (Mimir connection) ──
apiVersion: spv.no/v2beta1
kind: AzureKeyVaultSecret
metadata:
  name: mcp-mimir-tls-ca
  labels:
    app.kubernetes.io/name: sample-mcp-mimir
    app: sample-mcp-mimir
    appcode: SAMPLE
spec:
  vault:
    name: sample-dev-eu-kv-01
    object:
      name: mcp-mimir-tls-ca
      type: secret
  output:
    secret:
      name: mcp-mimir-tls-secret
      dataKey: ca.crt

---
# ── TLS Client Certificate ──
apiVersion: spv.no/v2beta1
kind: AzureKeyVaultSecret
metadata:
  name: mcp-mimir-tls-cert
  labels:
    app.kubernetes.io/name: sample-mcp-mimir
    app: sample-mcp-mimir
    appcode: SAMPLE
spec:
  vault:
    name: sample-dev-eu-kv-01
    object:
      name: mcp-mimir-tls-cert
      type: secret
  output:
    secret:
      name: mcp-mimir-tls-secret
      dataKey: tls.crt

---
# ── TLS Client Key ──
apiVersion: spv.no/v2beta1
kind: AzureKeyVaultSecret
metadata:
  name: mcp-mimir-tls-key
  labels:
    app.kubernetes.io/name: sample-mcp-mimir
    app: sample-mcp-mimir
    appcode: SAMPLE
spec:
  vault:
    name: sample-dev-eu-kv-01
    object:
      name: mcp-mimir-tls-key
      type: secret
  output:
    secret:
      name: mcp-mimir-tls-secret
      dataKey: tls.key

###############################################################################
# MCP Mimir Server — Runtime Configuration
#
# These values are injected as environment variables into the container.
# Override per-environment via Kustomize overlays.
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-mimir-config
  labels:
    app.kubernetes.io/name: sample-mcp-mimir
    app.kubernetes.io/instance: sample-mcp-mimir
    app: sample-mcp-mimir
    appcode: SAMPLE
    costcenter: "9901623"
    drcategory: "dr3"
    portfolio: AI-CloudOps
    project: SAMPLE
data:
  # ── Prometheus / Mimir Connection ──
  PROMETHEUS_URL: "https://sample-metrics-dev-01.albertsons.com/prometheus"
  PROMETHEUS_ORGID: "aks-tru-clusters"
  PROMETHEUS_USERNAME: ""
  PROMETHEUS_PASSWORD: ""

  # ── Transport & Server ──
  TRANSPORT: "sse"
  HTTP_ADDR: ":8000"
  METRICS_ADDR: ":9090"

  # ── Logging ──
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

apiVersion: v1
kind: Service
metadata:
  name: mcp-prometheus
  labels:
    app.kubernetes.io/name: mcp-prometheus
    app.kubernetes.io/component: mcp-server
spec:
  type: ClusterIP
  ports:
    - name: http-mcp
      port: 8080
      targetPort: http-mcp
      protocol: TCP
    - name: http-metrics
      port: 9091
      targetPort: http-metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: mcp-prometheus
